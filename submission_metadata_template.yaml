# ============================================================================
# Approach summary (optional but recommended)
# ============================================================================
methodology_summary: |
  "Built an end-to-end ranking pipeline that converts raw candidate JSON profiles 
  into dense, context‑preserving documents (career history, skills, education, availability signals).
  A bi‑encoder (BGE‑base) retrieves a broad pool of candidates via FAISS, followed by a cross‑encoder 
  (BGE‑reranker) that jointly scores each query–candidate pair for precise ranking. Before retrieval,
  a constraint layer applies hard filters (e.g., consulting‑only, pure research, stale architects) and 
  computes a soft score (experience, skills, location, activity) that is blended with the similarity score.
  All models are cached locally for offline use; the FAISS index can be pre‑built and downloaded to avoid 
  rebuild time. The final output is a CSV with rank, score, and a reasoning snippet (years of experience, 
  number of skills, profile preview). The system runs entirely on CPU for inference, with GPU optionally 
  used only for index building (Pre-ranking phase).
  The goal was to build something STABLE , FAST , SIMPLE YET POWERFUL and PRODUCTION-GRADE Architecture."

